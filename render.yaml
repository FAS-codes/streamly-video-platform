# Render Blueprint for the Streamly backend API.
# In Render: New → Blueprint → connect this repo. Render reads this file and
# provisions the service. Then set the two `sync: false` secrets in the dashboard.
services:
  - type: web
    name: streamly-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Auto-generated strong secret for signing JWTs.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MAX_UPLOAD_MB
        value: "500"
      # Set these in the Render dashboard:
      #   MONGO_URI     -> your MongoDB Atlas connection string
      #   CLIENT_ORIGIN -> your deployed Vercel URL (e.g. https://...vercel.app)
      - key: MONGO_URI
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
